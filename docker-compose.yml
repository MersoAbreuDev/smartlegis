name: smartlegis

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartlegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartlegis
      POSTGRES_USER: smartlegis
      POSTGRES_PASSWORD: smartlegis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartlegis -d smartlegis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
    name: smartlegis-postgres-data
